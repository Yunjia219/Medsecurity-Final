<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedSafe-Chain | 載入中</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #EEF2F7; }
        .medical-gradient { background: linear-gradient(135deg, #1A5276 0%, #2980B9 100%); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="text-center">
        <div class="w-16 h-16 medical-gradient rounded-2xl flex items-center justify-center text-white mx-auto mb-6 animate-pulse">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
            </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-800 mb-2">MedSafe-Chain</h1>
        <p class="text-gray-500">正在安全連線至區塊鏈醫療網...</p>
    </div>

    <script>
        // 檢查登入狀態並跳轉
        setTimeout(() => {
            const userData = localStorage.getItem('demo_user');
            if (userData) {
                const user = JSON.parse(userData);
                switch(user.role) {
                    case 'admin': window.location.href = 'admin.html'; break;
                    case 'doctor': window.location.href = 'dashboard.html'; break;
                    case 'patient': window.location.href = 'patient.html'; break;
                    case 'insurance': window.location.href = 'insurance.html'; break;
                    default: window.location.href = 'login.html';
                }
            } else {
                window.location.href = 'login.html';
            }
        }, 1500);
    </script>
</body>
</html>
